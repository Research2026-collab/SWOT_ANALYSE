<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWOT-Workshop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f4f4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: #1a1a2e;
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: .04em; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,.55); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #4caf50;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .live-text { font-size: 12px; color: rgba(255,255,255,.6); }
  .btn-clear {
    font-size: 12px; padding: 5px 14px; border-radius: 6px;
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    color: #fff; cursor: pointer;
  }
  .btn-clear:hover { background: rgba(255,255,255,.2); }

  /* ── Input bar ── */
  .input-bar {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 32px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .input-bar select, .input-bar input {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    outline: none;
    background: #fafafa;
  }
  .input-bar select { min-width: 130px; }
  .input-bar input { flex: 1; min-width: 200px; }
  .input-bar select:focus, .input-bar input:focus { border-color: #888; background: #fff; }
  .btn-add {
    font-size: 14px; font-weight: 600;
    padding: 8px 22px; border-radius: 8px;
    background: #1a1a2e; color: #fff;
    border: none; cursor: pointer;
  }
  .btn-add:hover { background: #2d2d4e; }
  .anon-note { font-size: 11px; color: #aaa; display: flex; align-items: center; gap: 4px; }

  /* ── Main board ── */
  .board-wrap {
    flex: 1;
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .axis-top {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    color: #999;
    text-transform: uppercase;
    padding-bottom: 8px;
    margin-left: 28px;
  }

  .board-row { display: flex; gap: 0; align-items: stretch; }

  .axis-side {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    color: #999;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 8px;
    width: 28px;
    white-space: nowrap;
  }

  .swot-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,.10);
    min-height: 480px;
  }

  /* center cross */
  .swot-grid::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: calc(50% - 0.5px);
    width: 1px;
    background: rgba(0,0,0,.13);
    z-index: 2;
  }
  .swot-grid::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: calc(50% - 0.5px);
    height: 1px;
    background: rgba(0,0,0,.13);
    z-index: 2;
  }

  /* center circle */
  .center-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 72px; height: 72px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 0 6px rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
    color: #1a1a2e;
    letter-spacing: .08em;
    z-index: 10;
  }

  .quadrant {
    padding: 22px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .q-s { background: #eaf4e0; }
  .q-w { background: #fef3e2; }
  .q-o { background: #e3f0fc; }
  .q-t { background: #fdecea; }

  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .q-icon {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; flex-shrink: 0;
  }
  .q-s .q-icon { background: #b6dfa0; color: #2e6b1a; }
  .q-w .q-icon { background: #fad89a; color: #8a5a00; }
  .q-o .q-icon { background: #9dc8f5; color: #0c4a8a; }
  .q-t .q-icon { background: #f5a9a5; color: #8a1a1a; }

  .q-label {
    font-size: 18px;
    font-weight: 700;
  }
  .q-s .q-label { color: #2e6b1a; }
  .q-w .q-label { color: #8a5a00; }
  .q-o .q-label { color: #0c4a8a; }
  .q-t .q-label { color: #8a1a1a; }

  .q-count {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    opacity: .7;
  }
  .q-s .q-count { background: #c8ecb4; color: #2e6b1a; }
  .q-w .q-count { background: #fce4b0; color: #8a5a00; }
  .q-o .q-count { background: #b5d8f8; color: #0c4a8a; }
  .q-t .q-count { background: #f8beba; color: #8a1a1a; }

  .chips {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .chip {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,.75);
    font-size: 13px;
    line-height: 1.4;
    color: #222;
    border: 1px solid rgba(0,0,0,.06);
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .chip-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }
  .q-s .chip-dot { background: #4a9e28; }
  .q-w .chip-dot { background: #c07e00; }
  .q-o .chip-dot { background: #1872c4; }
  .q-t .chip-dot { background: #c0281a; }

  .chip-text { flex: 1; }
  .chip-dup {
    font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 10px;
    background: rgba(0,0,0,.09); color: #555;
    flex-shrink: 0; align-self: flex-start; margin-top: 3px;
  }

  .empty-hint {
    font-size: 12px;
    color: rgba(0,0,0,.3);
    font-style: italic;
    padding: 4px 2px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff; font-size: 13px;
    padding: 9px 20px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">SWOT-Analyse</div>
    <div class="header-sub">Gemeinsamer Workshop · Hauptausschuss</div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-text">Live</span>
    <button class="btn-clear" onclick="confirmClear()">Board leeren</button>
  </div>
</div>

<div class="input-bar">
  <select id="q-select">
    <option value="S">Stärke</option>
    <option value="W">Schwäche</option>
    <option value="O">Chance</option>
    <option value="T">Risiko</option>
  </select>
  <input type="text" id="entry-input" placeholder="Eintrag eingeben und Enter drücken …" maxlength="200" />
  <button class="btn-add" onclick="submitEntry()">Hinzufügen</button>
  <span class="anon-note">&#128274; Anonym</span>
</div>

<div class="board-wrap">
  <div class="axis-top">Interne Faktoren &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Externe Faktoren</div>
  <div class="board-row">
    <div class="axis-side" style="justify-content:flex-end;padding-bottom:40px">Positiv</div>
    <div class="swot-grid" id="swot-grid">

      <div class="quadrant q-s" id="quad-S">
        <div class="q-header">
          <div class="q-icon">S</div>
          <span class="q-label">Stärken</span>
          <span class="q-count" id="count-S">0</span>
        </div>
        <div class="chips" id="chips-S"></div>
      </div>

      <div class="quadrant q-o" id="quad-O">
        <div class="q-header">
          <div class="q-icon">O</div>
          <span class="q-label">Chancen</span>
          <span class="q-count" id="count-O">0</span>
        </div>
        <div class="chips" id="chips-O"></div>
      </div>

      <div class="quadrant q-w" id="quad-W">
        <div class="q-header">
          <div class="q-icon">W</div>
          <span class="q-label">Schwächen</span>
          <span class="q-count" id="count-W">0</span>
        </div>
        <div class="chips" id="chips-W"></div>
      </div>

      <div class="quadrant q-t" id="quad-T">
        <div class="q-header">
          <div class="q-icon">R</div>
          <span class="q-label">Risiken</span>
          <span class="q-count" id="count-T">0</span>
        </div>
        <div class="chips" id="chips-T"></div>
      </div>

      <div class="center-circle">SWOT</div>
    </div>
    <div class="axis-side" style="justify-content:flex-start;padding-top:40px">Negativ</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var POLL_INTERVAL = 5000;
var pollTimer = null;

function submitEntry() {
  var q = document.getElementById('q-select').value;
  var text = document.getElementById('entry-input').value.trim();
  if (!text) return;
  document.getElementById('entry-input').value = '';
  document.getElementById('entry-input').disabled = true;

  google.script.run
    .withSuccessHandler(function() {
      document.getElementById('entry-input').disabled = false;
      showToast('Eintrag gespeichert');
      loadEntries();
    })
    .withFailureHandler(function() {
      document.getElementById('entry-input').disabled = false;
      showToast('Fehler beim Speichern');
    })
    .addEntry(q, text);
}

function loadEntries() {
  google.script.run
    .withSuccessHandler(renderBoard)
    .withFailureHandler(function(){})
    .getEntries();
}

function renderBoard(data) {
  ['S','W','O','T'].forEach(function(q) {
    var items = data[q] || [];
    var el = document.getElementById('chips-' + q);
    document.getElementById('count-' + q).textContent = items.length;
    el.innerHTML = '';
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-hint">Noch keine Einträge …</div>';
      return;
    }
    var counts = {};
    items.forEach(function(t) { counts[t] = (counts[t] || 0) + 1; });
    var seen = {};
    items.forEach(function(t) {
      if (seen[t]) return;
      seen[t] = true;
      var d = document.createElement('div');
      d.className = 'chip';
      d.innerHTML = '<div class="chip-dot"></div>'
        + '<span class="chip-text">' + escHtml(t) + '</span>'
        + (counts[t] > 1 ? '<span class="chip-dup">×' + counts[t] + '</span>' : '');
      el.appendChild(d);
    });
  });
}

function confirmClear() {
  if (!confirm('Alle Einträge wirklich löschen?')) return;
  google.script.run
    .withSuccessHandler(function() { loadEntries(); showToast('Board geleert'); })
    .clearAll();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('entry-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitEntry();
});

loadEntries();
pollTimer = setInterval(loadEntries, POLL_INTERVAL);
</script>
</body>
</html>
